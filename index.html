<!DOCTYPE html>
<html lang="bn">
<head>

    <title>আদরিণী - Mock Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>আদরিণী - Mock Test</h1>

<script src="questions.js"></script>
